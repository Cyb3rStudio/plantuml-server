# fly.toml app configuration file generated for plantuml-server on 2026-05-05T14:15:31Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'plantuml-server'
primary_region = 'yyz'

[build]

[[mounts]]
  source = 'jetty'
  destination = '/tmp/jetty'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 4096
